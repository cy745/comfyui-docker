services:
  comfyui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comfyui
    ports:
      - "${COMFYUI_PORT:-8188}:8188"
    volumes:
      # Persist models, input, output across container restarts
      - ./storage/models:/app/models
      - ./storage/input:/app/input
      - ./storage/output:/app/output
      # Persist custom nodes (ComfyUI-Manager auto-installed on first run)
      - ./storage/custom_nodes:/app/custom_nodes
      # Persist workflows
      - ./storage/workflows:/app/workflows
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-all}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
