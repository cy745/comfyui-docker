services:
  comfyui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comfyui
    ports:
      - "${COMFYUI_PORT:-8188}:8188"
    volumes:
      # Persist models, input, output across container restarts
      - ./storage/models:/app/models
      - ./storage/input:/app/input
      - ./storage/output:/app/output
      # Persist custom nodes (ComfyUI-Manager auto-installed on first run)
      - ./storage/custom_nodes:/app/custom_nodes
      # Persist user-created workflows
      - ./storage/user/default/workflows:/app/user/default/workflows
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-all}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  llama-cpp:
    image: ghcr.io/ggerganov/llama.cpp:server-cuda
    container_name: llama-cpp
    ports:
      - "8080:8080"
    volumes:
      - ./storage/models/toriigate:/models
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-all}
    command: >
      --host 0.0.0.0 --port 8080
      -m /models/ToriiGate-0.5-Q4_K_M.gguf
      --mmproj /models/ToriiGate-0.5-fp16.mmproj.gguf
      -b 2048 -ub 1024 -fa on -fit on -fitt 1024 -ngl 999
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
